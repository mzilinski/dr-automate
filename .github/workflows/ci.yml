name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Install linting tools
        run: |
          pip install ruff
      
      - name: Run Ruff Linter
        run: ruff check . --output-format=github
      
      - name: Run Ruff Formatter Check
        run: ruff format --check .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .
          pip install --group dev

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: dr-automate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # SECRET_KEY ist seit dem Sicherheits-Hardening in Produktion Pflicht.
          # Hier eine ephemere ID für den Smoke-Test; nicht für echte Deployments verwenden.
          docker run --rm -d -p 5000:5000 \
            -e SECRET_KEY="$(openssl rand -hex 32)" \
            --name test-container dr-automate:${{ github.sha }}
          # Poll health endpoint instead of sleep — gunicorn cold start can be slow on CI runners
          for i in {1..15}; do
            if curl -fsS http://localhost:5000/health > /dev/null; then
              echo "Container healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Container did not become healthy in 15s. Logs:"
              docker logs test-container
              docker stop test-container
              exit 1
            fi
            sleep 1
          done
          docker stop test-container

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        # --severity-level medium: low-severity findings melden, aber nicht failen.
        # Medium/High lassen den Job rot werden — kein "|| true"-Theatre mehr.
        # Excludes: tests + virtuelle Envs + Build-Artefakte (sind in CI normalerweise nicht da,
        # aber falls jemand local cached und committed, scannen wir nicht through dependencies).
        run: bandit -r . -x ./tests,./.venv,./.pytest_cache,./htmlcov --severity-level medium -f json -o bandit-report.json

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
